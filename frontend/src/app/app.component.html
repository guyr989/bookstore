<header class="topbar">
  <div class="brand">
    <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20" />
      <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z" />
    </svg>
    <h1>{{ title }}</h1>
  </div>
  <nav>
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Catalog</a>
    <a routerLink="/add" routerLinkActive="active">Add book</a>
    <a routerLink="/report" routerLinkActive="active">Report</a>
    <a routerLink="/versions" routerLinkActive="active">History</a>
  </nav>
</header>

<main>
  <router-outlet></router-outlet>
</main>

<app-toasts></app-toasts>
<app-confirm-dialog></app-confirm-dialog>
